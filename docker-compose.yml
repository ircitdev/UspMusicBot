version: "3.9"

services:
  bot:
    build: .
    container_name: uspmusic_bot
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - uspmusic_net

  redis:
    image: redis:7-alpine
    container_name: uspmusic_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - uspmusic_net

volumes:
  redis_data:

networks:
  uspmusic_net:
    driver: bridge
